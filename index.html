<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp UI Clone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #0b141a; height: 100vh; display: flex; justify-content: center; align-items: center; }

    .app {
      width: 360px;
      height: 640px;
      background: #111b21;
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: white;
    }

    .header {
      background: #075e54;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .screen {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #aaa;
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      border: none;
      border-bottom: 2px solid #25d366;
      background: transparent;
      color: white;
      outline: none;
      margin-bottom: 20px;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 20px;
      background: #25d366;
      color: white;
      cursor: pointer;
    }

    button:hover { background: #1ebe5d; }

    /* Chat UI */
    .chat-list { flex: 1; overflow-y: auto; }

    .chat-item {
      padding: 15px;
      border-bottom: 1px solid #222;
    }

    .chat-item:hover { background: #202c33; }

    .chat-name { font-weight: bold; }
    .chat-msg { font-size: 12px; color: #aaa; }

    .messages { flex: 1; padding: 10px; overflow-y: auto; }

    .msg {
      max-width: 70%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
      font-size: 14px;
    }

    .sent { background: #005c4b; margin-left: auto; }
    .received { background: #202c33; }

    .input-area {
      display: flex;
      padding: 10px;
      background: #202c33;
    }

    .input-area input {
      flex: 1;
      border: none;
      background: #2a3942;
      border-radius: 20px;
      padding: 10px;
      color: white;
    }

    .input-area button { margin-left: 10px; }

  </style>
</head>
<body>

<div class="app">

  <!-- SCREEN 1: Phone Number -->
  <div class="header">WhatsApp</div>
  <div class="screen">
    <div class="title">Enter your phone number</div>
    <div class="subtitle">WhatsApp will send you a verification code</div>
    <input type="text" placeholder="+880 1XXXXXXXXX">
    <button>Next</button>
  </div>

  <!-- SCREEN 2: OTP (just UI example) -->
  <div class="screen" style="display:none;">
    <div class="title">Enter Code</div>
    <div class="subtitle">We sent a code to your number</div>
    <input type="text" placeholder="------">
    <button>Verify</button>
  </div>

  <!-- SCREEN 3: Chat List -->
  <div class="screen" style="display:none;">
    <div class="title">Chats</div>
    <div class="chat-list">
      <div class="chat-item">
        <div class="chat-name">Rahim</div>
        <div class="chat-msg">Hey bro</div>
      </div>
      <div class="chat-item">
        <div class="chat-name">Karim</div>
        <div class="chat-msg">Call me</div>
      </div>
    </div>
  </div>

  <!-- SCREEN 4: Chat Window -->
  <div class="screen" style="display:none; padding:0;">
    <div class="header">Rahim</div>
    <div class="messages">
      <div class="msg received">Hello</div>
      <div class="msg sent">Hi!</div>
    </div>
    <div class="input-area">
      <input type="text" placeholder="Message">
      <button>Send</button>
    </div>
  </div>

</div>

</body>
</html>
